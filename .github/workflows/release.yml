name: Release binaries

on:
  release:
    types:
      - created

env:
  GO_VERSION: ^1.17

jobs:
  release-linux:
    name: Release for Linux
    strategy:
      matrix:
        goos:
          - linux
        goarch:
          - 386
          - amd64
          - arm
          - arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install Go
        uses: actions/setup-go@v2
        with:
          go-version: ${{ env.GO_VERSION }}
